<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container glass-panel">
        <header>
            <div class="logo-wrapper">
                <i class="ph-fill ph-check-circle logo-icon"></i>
            </div>
            <h1>Task Manager Pro</h1>
            <p>Elevate your productivity to the next level.</p>
        </header>

        <main>
            <section class="task-form-section">
                <h2><i class="ph ph-rocket-launch"></i> Launch a Task</h2>
                <form id="task-form">
                    <div class="input-group">
                        <input type="text" id="title" placeholder=" " required maxlength="50">
                        <label for="title">What needs to be done?</label>
                    </div>
                    <div class="input-group">
                        <textarea id="description" placeholder=" " required maxlength="50"></textarea>
                        <label for="description">Add delicate details...</label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-glow" id="submit-btn">
                            <span>Create Task</span> <i class="ph-bold ph-arrow-right"></i>
                        </button>
                        <button type="button" class="btn-ghost hidden" id="cancel-edit-btn">
                            <i class="ph-bold ph-x"></i> Cancel
                        </button>
                    </div>
                </form>
            </section>

            <section class="tasks-list-section">
                <div class="list-header">
                    <h2><i class="ph ph-kanban"></i> Your Board</h2>
                    <div class="badge" id="task-count">0 Tasks</div>
                </div>
                
                <div id="loading" class="hidden">
                    <i class="ph-bold ph-spinner-gap spin"></i> Syncing...
                </div>
                
                <div id="tasks-container" class="tasks-grid">
                    <!-- Tasks injected here via JS -->
                </div>
            </section>
        </main>
    </div>
    
    <div id="toast" class="toast hidden">
        <i class="ph-fill toast-icon" id="toast-icon"></i>
        <span class="toast-message" id="toast-message"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
